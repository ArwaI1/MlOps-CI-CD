name: ML Validation and Deployment Pipeline

on:
  push:
    branches: ["**"]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 – VALIDATE
  # ─────────────────────────────────────────────
  validate:
    name: Validate Model
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Pull training data via DVC
      # If you have no DVC remote, replace `dvc pull` with:
      # run: echo "No DVC remote configured - skipping pull"
      - name: Pull data with DVC
        run: dvc pull

      # Train the model and log to the MLflow Tracking Server
      - name: Train model
        env:
          # MLFLOW_TRACKING_URI  – URL of your self-hosted MLflow server
          #                        e.g. http://<your-server-ip>:5000
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          # MLFLOW_TRACKING_USERNAME / PASSWORD are only needed if you
          # enabled --auth on the MLflow server (mlflow server --auth).
          # Leave the secrets empty / unset if your server has no auth.
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
          # Set this secret to 0.70 for a FAILED run or 0.90 for a PASSING run
          MOCK_ACCURACY: ${{ secrets.MOCK_ACCURACY }}
        run: python train.py --epochs 1

      # Upload model_info.txt so the deploy job can read the Run ID
      - name: Upload model_info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 2 – DEPLOY
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy Model
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Download the artifact produced by the validate job
      - name: Download model_info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      # Fail the pipeline if accuracy < 0.85
      - name: Check accuracy threshold
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: python check_threshold.py

      # Mock Docker build — simulates containerising the model
      - name: Mock Docker build
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: $RUN_ID"
          echo "docker build --build-arg RUN_ID=$RUN_ID -t sign-language-model:$RUN_ID ."
          echo "Mock Docker build complete."
